<!doctype html>
<!-- 黎明，终会到来 | 铃芽 HiSuzume -->

<!-- 自动生成，请勿修改 -->
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" />
        <meta
            name="renderer"
            content="webkit" />
        <meta
            name="force-rendering"
            content="webkit" />
        <meta
            http-equiv="X-UA-Compatible"
            content="IE=edge,chrome=1" />
        <link
            rel="icon"
            href="../../../icon.ico"
            type="image/x-icon" />
        <meta
            name="description"
            content="{预览}" />
        <!-- MDUI CSS -->
        <link
            rel="stylesheet"
            href="https://unpkg.com/mdui@1.0.2/dist/css/mdui.min.css" />
        <title>{标题} - 铃芽</title>
    </head>
    <!-- HiSuzume 版权所有 请勿删除此信息 -->
    <body
        class="mdui-theme-layout-auto mdui-drawer-body-left mdui-appbar-with-toolbar mdui-theme-primary-teal mdui-theme-accent-teal-a700 mdui-loaded">
        <link
            rel="stylesheet"
            href="../../../style.css" />
        <!-- MDUI 标题栏 -->
        <div class="mdui-appbar mdui-appbar-fixed">
            <div class="mdui-toolbar mdui-color-theme">
                <!--<a
                    onclick="document.location.replace('../../../')"
                    mdui-tooltip="{content: '返回'}"
                    class="mdui-btn mdui-btn-icon">
                    <i class="mdui-icon material-icons">arrow_back</i>
                </a>-->
                <a
                    mdui-drawer="{target: '#drawer'}"
                    mdui-tooltip="{content: '侧边栏'}"
                    class="mdui-btn mdui-btn-icon">
                    <i class="mdui-icon material-icons">menu</i>
                </a>
                <a class="mdui-typo-title" href="../../../">铃芽</a>
                <div class="mdui-toolbar-spacer">
                </div>
                <a
                    onclick="document.location.reload()"
                    mdui-tooltip="{content: '刷新'}"
                    class="mdui-btn mdui-btn-icon mdui-ripple">
                    <i class="mdui-icon material-icons">refresh</i>
                </a>
            </div>
        </div>
        <!-- 应用抽屉 -->
        <div
            class="mdui-drawer"
            id="drawer">
            <div
                class="mdui-list"
                mdui-collapse="{accordion: true}"
                style="margin-bottom: 76px;">
{抽屉列表}
                    <div class="mdui-collapse-item mdui-collapse-item-open">
                    <div class="mdui-collapse-item-header mdui-list-item mdui-ripple">
                        <i class="mdui-list-item-icon mdui-icon material-icons mdui-text-color-theme">archive</i>
                        <div class="mdui-list-item-content">文章归档</div>
                        <i class="mdui-collapse-item-arrow mdui-icon material-icons">keyboard_arrow_down</i>
                    </div>
                    <ul class="mdui-collapse-item-body mdui-list">
{归档列表}
                        </ul>
                </div>
            </div>
        </div>
        <!-- 主要内容 -->
        <img
            src="card.png"
            onerror="this.src='../../../default_card.png'"
            width="100%"
            height="10%"
            alt="本章节的封面图"
            style="box-sizing:border-box;"
            class="mdui-center cover" />
        <!-- margin: 上 右 下 左 -->
        <div
            id="md"
            class="mdui-typo"
            style="font-size:105%;margin: 10% 10% 10% 10%">
{内容}
        </div>
        <div>
            <div
                class="mdui-text-color-theme"
                style="font-size:110%;text-align:center;">Copyright © 2023 铃芽 💮 HiSuzume</div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/showdown">
        </script>
        <script>
/*配置MD解析选项*/
showdown.setOption('customizedHeaderId',true);
showdown.setOption('tables',true);
showdown.setOption('strikethrough',true);
showdown.setOption('tasklists',true);
showdown.setOption('underline',true);
showdown.setOption('backslashEscapesHTMLTags',true);
showdown.setOption('ghCodeBlocks',true);
/*获取元素*/
var mdc = document.getElementById("md");
/*解析*/
var converter = new showdown.Converter(),
    text = mdc.textContent + "",
    html = converter.makeHtml(text);
/*显示*/
mdc.innerHTML = html;
/*定义对话框*/
alert = function(c) {
    mdui.dialog({
        title: '提示',
        content: c + '',
        buttons: [{
            text: '确定'
        }]
    });
}
        </script>
        <!-- MDUI JavaScript -->
        <script src="https://unpkg.com/mdui@1.0.2/dist/js/mdui.min.js">
        </script>
    </body>
</html>
