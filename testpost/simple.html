<!doctype html>

	<body class="mdui-appbar-with-toolbar mdui-theme-primary-teal mdui-theme-accent-teal mdui-loaded mdui-locked">
		<style>
.wen-circle {
    border-radius:20px 20px 20px 20px;
}

a:link {text-decoration:none;}

.card-margin {
    margin: 20px 20px 20px 20px;
}

.card-center {
	margin:0 auto;
	margin-top: 30px;
	width: 55%;
	height: 50%;
}

.hide {
	background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial; background-color: rgb(0, 0, 0) !important; color: rgb(0, 0, 0) !important;
}

body {
	font-family: serif;
}

.content {
	margin-left:20%;
	margin-right:20%;

		<!-- MDUI 标题栏 -->
		<div class="mdui-appbar mdui-appbar-fixed">
			<div class="mdui-toolbar mdui-color-theme">
				<a mdui-drawer="{target: '#drawer'}" class="mdui-btn mdui-btn-icon">

					<ul class="mdui-collapse-item-body mdui-list">

							<i class="mdui-list-item-icon mdui-icon material-icons">link</i>

							<i class="mdui-list-item-icon mdui-icon material-icons">email</i>

						</li>
					</ul>
				</div>
				<div class="mdui-collapse-item">
					<div class="mdui-collapse-item-header mdui-list-item mdui-ripple">
